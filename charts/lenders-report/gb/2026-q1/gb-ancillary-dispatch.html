<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB Ancillary Dispatch</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #333333;
    }
    .chart-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 24px 24px 16px 24px;
    }
    .chart-header { margin-bottom: 2px; }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.3;
      color: #333333;
      margin: 0;
    }
    .chart-header h1 b { font-weight: 700; }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a4a4a;
      margin-top: 6px;
      line-height: 1.3;
    }
    #chart { flex: 1; min-height: 0; width: 100%; }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <div class="chart-header">
      <h1>Ancillary revenues compress as more BESS enters Dynamic services markets</h1>
      <div class="chart-subheader">Annual ancillary revenue by service type (£k/MW)</div>
    </div>

    <div id="chart"></div>
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    const years = ['2026','2027','2028','2029','2030','2031','2032','2033','2034','2035','2036','2037','2038','2039','2040'];

    const data = [
      {
        name: 'DC',
        type: 'scatter',
        mode: 'lines',
        x: years,
        y: [25, 22, 18, 14, 10, 8, 7, 6, 5, 5, 4, 4, 4, 3, 3],
        line: { width: 2.5, color: '#467ee4', shape: 'spline', smoothing: 1.0 },
        hovertemplate: '£%{y}k/MW<extra>DC</extra>',
      },
      {
        name: 'DM',
        type: 'scatter',
        mode: 'lines',
        x: years,
        y: [10, 9, 7, 5, 3, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2],
        line: { width: 2.5, color: '#27ac60', shape: 'spline', smoothing: 1.0 },
        hovertemplate: '£%{y}k/MW<extra>DM</extra>',
      },
      {
        name: 'DR',
        type: 'scatter',
        mode: 'lines',
        x: years,
        y: [5, 4, 3, 3, 2, 2, 2, 2, 2, 2, 2, 2, 1, 1, 1],
        line: { width: 2.5, color: '#f7c191', shape: 'spline', smoothing: 1.0 },
        hovertemplate: '£%{y}k/MW<extra>DR</extra>',
      },
    ];

    // ===== LAYOUT =====
    const layout = {
      font: { family: '"DM Sans", sans-serif', color: '#4a4a4a', size: 12 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      margin: { t: 10, r: 20, b: 40, l: 0, pad: 0 },
      title: null,
      xaxis: {
        showgrid: false,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        automargin: true,
      },
      yaxis: {
        showgrid: true,
        gridcolor: '#E8E8E8',
        gridwidth: 1,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        zeroline: true,
        zerolinecolor: '#D0D0D0',
        zerolinewidth: 1,
        automargin: true,
        title: { text: '£k/MW', font: { size: 12, color: '#4a4a4a' } },
        range: [0, 32],
      },
      legend: {
        orientation: 'h',
        yanchor: 'bottom',
        y: 1.02,
        xanchor: 'left',
        x: 0,
        font: { size: 13, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        bgcolor: 'rgba(255,255,255,0)',
        borderwidth: 0,
        itemsizing: 'constant',
        traceorder: 'normal',
      },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#333333',
        font: { family: '"DM Sans", sans-serif', size: 13, color: '#FFFFFF' },
        bordercolor: '#333333',
      },
    };

    // ===== RENDER =====
    Plotly.newPlot('chart', data, layout, {
      responsive: true,
      displayModeBar: false,
      staticPlot: false,
    });

    window.addEventListener('resize', () => { Plotly.Plots.resize('chart'); });
  </script>
</body>
</html>
