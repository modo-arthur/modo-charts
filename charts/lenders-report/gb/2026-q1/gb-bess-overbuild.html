<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB BESS Overbuild Scenarios</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #333333;
    }
    .chart-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 24px 24px 16px 24px;
    }
    .chart-header { margin-bottom: 2px; }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.3;
      color: #333333;
      margin: 0;
    }
    .chart-header h1 b { font-weight: 700; }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a4a4a;
      margin-top: 6px;
      line-height: 1.3;
    }
    #chart { flex: 1; min-height: 0; width: 100%; }
    .chart-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 10px;
      gap: 16px;
    }
    .chart-footer-left { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .chart-source {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #AAAAAA;
      line-height: 1.4;
    }
    .chart-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #333333;
      letter-spacing: 0.25em;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <div class="chart-header">
      <h1>BESS overbuild scenarios diverge significantly — <b>High buildout</b> compresses revenues by <b>25%</b></h1>
      <div class="chart-subheader">Annual 2h BESS revenue under buildout scenarios (£k/MW)</div>
    </div>

    <div id="chart"></div>

    <div class="chart-footer">
      <div class="chart-footer-left">
        <div class="chart-source">Source: Modo Energy</div>
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    const years = ['2026','2027','2028','2029','2030','2031','2032','2033','2034','2035'];

    const data = [
      {
        name: 'Low BESS',
        type: 'scatter',
        mode: 'lines',
        x: years,
        y: [95, 92, 88, 84, 82, 81, 80, 80, 80, 80],
        line: { width: 2.5, color: '#27ac60', shape: 'spline', smoothing: 1.0 },
        hovertemplate: '£%{y}k/MW<extra>Low BESS</extra>',
      },
      {
        name: 'Central',
        type: 'scatter',
        mode: 'lines',
        x: years,
        y: [90, 85, 80, 76, 72, 71, 70, 70, 70, 70],
        line: { width: 2.5, color: '#467ee4', shape: 'spline', smoothing: 1.0 },
        hovertemplate: '£%{y}k/MW<extra>Central</extra>',
      },
      {
        name: 'High BESS',
        type: 'scatter',
        mode: 'lines',
        x: years,
        y: [82, 75, 67, 62, 58, 56, 55, 54, 54, 55],
        line: { width: 2.5, color: '#e85f37', shape: 'spline', smoothing: 1.0 },
        hovertemplate: '£%{y}k/MW<extra>High BESS</extra>',
      },
    ];

    // ===== LAYOUT =====
    const layout = {
      font: { family: '"DM Sans", sans-serif', color: '#4a4a4a', size: 12 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      margin: { t: 10, r: 20, b: 40, l: 0, pad: 0 },
      title: null,
      xaxis: {
        showgrid: false,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        automargin: true,
      },
      yaxis: {
        showgrid: true,
        gridcolor: '#E8E8E8',
        gridwidth: 1,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        zeroline: false,
        automargin: true,
        title: { text: '£k/MW', font: { size: 12, color: '#4a4a4a' } },
        range: [40, 110],
      },
      legend: {
        orientation: 'h',
        yanchor: 'bottom',
        y: 1.02,
        xanchor: 'left',
        x: 0,
        font: { size: 13, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        bgcolor: 'rgba(255,255,255,0)',
        borderwidth: 0,
        itemsizing: 'constant',
        traceorder: 'normal',
      },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#333333',
        font: { family: '"DM Sans", sans-serif', size: 13, color: '#FFFFFF' },
        bordercolor: '#333333',
      },
    };

    // ===== RENDER =====
    Plotly.newPlot('chart', data, layout, {
      responsive: true,
      displayModeBar: false,
      staticPlot: false,
    });

    window.addEventListener('resize', () => { Plotly.Plots.resize('chart'); });
  </script>
</body>
</html>
