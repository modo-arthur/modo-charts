<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB Daily Price Shape</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #333333;
    }
    .chart-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 24px 24px 16px 24px;
    }
    .chart-header { margin-bottom: 2px; }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.3;
      color: #333333;
      margin: 0;
    }
    .chart-header h1 b { font-weight: 700; }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a4a4a;
      margin-top: 6px;
      line-height: 1.3;
    }
    #chart { flex: 1; min-height: 0; width: 100%; }
    .chart-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 10px;
      gap: 16px;
    }
    .chart-footer-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }
    .chart-source {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #AAAAAA;
      line-height: 1.4;
    }
    .chart-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #333333;
      letter-spacing: 0.25em;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <div class="chart-header">
      <h1>Evening peak deepens as offshore wind penetration increases through <b>2040</b></h1>
      <div class="chart-subheader">Intraday price index by settlement period (daily average = 100)</div>
    </div>

    <div id="chart"></div>

    <div class="chart-footer">
      <div class="chart-footer-left">
        <div class="chart-source">Source: Modo Energy</div>
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    // 48 settlement periods (half-hourly), labelled every 4 periods
    const periods = Array.from({length: 48}, (_, i) => i + 1);
    const tickvals = [1, 5, 9, 13, 17, 21, 25, 29, 33, 37, 41, 45];
    const ticktext = ['00:00','02:00','04:00','06:00','08:00','10:00','12:00','14:00','16:00','18:00','20:00','22:00'];

    // Realistic UK intraday price shape (index, avg=100)
    // Low overnight, morning peak ~07:30-09:00, midday trough, strong evening peak 17:00-20:00
    function makeShape(morningPeak, middayTrough, eveningPeak, eveningWidth) {
      // period 1=00:00 ... 48=23:30
      const raw = [];
      for (let i = 0; i < 48; i++) {
        const h = i * 0.5; // hours
        let v = 80; // overnight base
        // Morning ramp 5:00-9:00
        if (h >= 5 && h < 7) v = 80 + (morningPeak - 80) * (h - 5) / 2;
        else if (h >= 7 && h < 9) v = morningPeak - (morningPeak - 85) * (h - 7) / 2;
        // Midday trough 10:00-15:00
        else if (h >= 9 && h < 10) v = 85 - (85 - middayTrough) * (h - 9);
        else if (h >= 10 && h < 14) v = middayTrough;
        else if (h >= 14 && h < 16) v = middayTrough + (90 - middayTrough) * (h - 14) / 2;
        // Evening peak 16:00-20:30
        else if (h >= 16 && h < 18) v = 90 + (eveningPeak - 90) * (h - 16) / 2;
        else if (h >= 18 && h < 18 + eveningWidth) v = eveningPeak;
        else if (h >= 18 + eveningWidth && h < 21) v = eveningPeak - (eveningPeak - 90) * (h - 18 - eveningWidth) / (3 - eveningWidth);
        // Late evening decline
        else if (h >= 21 && h < 23) v = 90 - (90 - 80) * (h - 21) / 2;
        else if (h >= 23) v = 80;
        else v = 80;
        raw.push(v);
      }
      // Normalise to mean 100
      const mean = raw.reduce((a, b) => a + b, 0) / raw.length;
      return raw.map(v => Math.round(v / mean * 100 * 10) / 10);
    }

    const shape2026 = makeShape(110, 88, 128, 1.5);
    const shape2030 = makeShape(108, 82, 135, 1.5);
    const shape2035 = makeShape(106, 75, 143, 2.0);
    const shape2040 = makeShape(104, 68, 152, 2.0);

    const data = [
      {
        name: '2026',
        type: 'scatter',
        mode: 'lines',
        x: periods,
        y: shape2026,
        line: { width: 2.5, color: '#467ee4', shape: 'spline', smoothing: 0.8 },
        hovertemplate: 'SP %{x}: %{y:.1f}<extra>2026</extra>',
      },
      {
        name: '2030',
        type: 'scatter',
        mode: 'lines',
        x: periods,
        y: shape2030,
        line: { width: 2.5, color: '#27ac60', shape: 'spline', smoothing: 0.8 },
        hovertemplate: 'SP %{x}: %{y:.1f}<extra>2030</extra>',
      },
      {
        name: '2035',
        type: 'scatter',
        mode: 'lines',
        x: periods,
        y: shape2035,
        line: { width: 2.5, color: '#a074fb', shape: 'spline', smoothing: 0.8 },
        hovertemplate: 'SP %{x}: %{y:.1f}<extra>2035</extra>',
      },
      {
        name: '2040',
        type: 'scatter',
        mode: 'lines',
        x: periods,
        y: shape2040,
        line: { width: 2.5, color: '#e85f37', shape: 'spline', smoothing: 0.8 },
        hovertemplate: 'SP %{x}: %{y:.1f}<extra>2040</extra>',
      },
    ];

    // ===== LAYOUT =====
    const layout = {
      font: {
        family: '"DM Sans", sans-serif',
        color: '#4a4a4a',
        size: 12,
      },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      margin: { t: 10, r: 20, b: 40, l: 0, pad: 0 },
      title: null,
      xaxis: {
        showgrid: false,
        showline: false,
        tickfont: { size: 11, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        automargin: true,
        tickvals: tickvals,
        ticktext: ticktext,
      },
      yaxis: {
        showgrid: true,
        gridcolor: '#E8E8E8',
        gridwidth: 1,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        zeroline: false,
        automargin: true,
        title: { text: 'Price index (avg=100)', font: { size: 12, color: '#4a4a4a' } },
      },
      legend: {
        orientation: 'h',
        yanchor: 'bottom',
        y: 1.02,
        xanchor: 'left',
        x: 0,
        font: { size: 13, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        bgcolor: 'rgba(255,255,255,0)',
        borderwidth: 0,
        itemsizing: 'constant',
        traceorder: 'normal',
      },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#333333',
        font: { family: '"DM Sans", sans-serif', size: 13, color: '#FFFFFF' },
        bordercolor: '#333333',
      },
    };

    // ===== RENDER =====
    Plotly.newPlot('chart', data, layout, {
      responsive: true,
      displayModeBar: false,
      staticPlot: false,
    });

    window.addEventListener('resize', () => {
      Plotly.Plots.resize('chart');
    });
  </script>
</body>
</html>
