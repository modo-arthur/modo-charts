<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Shortfall</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .chart-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #chart {
            width: 100%;
            height: 500px;
        }
        .modo-branding {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 12px;
        }
        .modo-branding a {
            color: #6F5FE5;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <div id="chart"></div>
        <div class="modo-branding">
            Generated by <a href="https://modoenergy.com">Modo Energy</a>
        </div>
    </div>

            chart.resize();

</body>
</html>
