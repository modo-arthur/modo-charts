      yaxis:  { ...yAxisBase, automargin: true, title: { text: 'GW', font: { size: 11, color: 'rgba(255,255,255,0.4)' }, standoff: 4 } },
      yaxis2: { ...yAxisBase, automargin: false, showticklabels: false, anchor: 'x2' },
      yaxis3: { ...yAxisBase, automargin: false, showticklabels: false, anchor: 'x3' },

      // Legend — horizontal, bottom
      legend: {
        orientation: 'h',
        xanchor: 'center', x: 0.5,
        yanchor: 'top', y: -0.08,
        font: { size: 11, color: 'rgba(255,255,255,0.75)', family: 'Inter, system-ui, sans-serif' },
        bgcolor: 'rgba(0,0,0,0)',
        borderwidth: 0,
        itemsizing: 'constant',
        traceorder: 'normal',
      },

      // Panel year labels
      annotations: [
        { text: '2015', xref: 'paper', yref: 'paper', x: 0.15,  y: 1.05, showarrow: false,
          font: { size: 15, color: '#ffffff', family: 'Inter, system-ui, sans-serif', weight: 600 }, xanchor: 'center' },
        { text: '2019', xref: 'paper', yref: 'paper', x: 0.50,  y: 1.05, showarrow: false,
          font: { size: 15, color: '#ffffff', family: 'Inter, system-ui, sans-serif', weight: 600 }, xanchor: 'center' },
        { text: '2021', xref: 'paper', yref: 'paper', x: 0.85,  y: 1.05, showarrow: false,
          font: { size: 15, color: '#ffffff', family: 'Inter, system-ui, sans-serif', weight: 600 }, xanchor: 'center' },
        // Thin separator lines
        { xref: 'paper', yref: 'paper', x: 0.325, y: 0, ax: 0.325, ay: 1,
          showarrow: true, arrowwidth: 0.5, arrowcolor: 'rgba(255,255,255,0.15)',
          arrowhead: 0, axref: 'paper', ayref: 'paper' },
        { xref: 'paper', yref: 'paper', x: 0.675, y: 0, ax: 0.675, ay: 1,
          showarrow: true, arrowwidth: 0.5, arrowcolor: 'rgba(255,255,255,0.15)',
          arrowhead: 0, axref: 'paper', ayref: 'paper' },
      ],

      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#0d2340',
        font: { family: 'Inter, system-ui, sans-serif', size: 12, color: '#fff' },
        bordercolor: 'rgba(255,255,255,0.2)',
      },
    };

    // ── RENDER ────────────────────────────────────────────────────────────────
    Plotly.newPlot('chart', traces, layout, {
      responsive: true,
      displayModeBar: false,
    });
    window.addEventListener('resize', () => Plotly.Plots.resize('chart'));
  </script>
</body>
</html>
