<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB IRR by Duration</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #333333;
    }
    .chart-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 24px 24px 16px 24px;
    }
    .chart-header { margin-bottom: 2px; }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.3;
      color: #333333;
      margin: 0;
    }
    .chart-header h1 b { font-weight: 700; }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a4a4a;
      margin-top: 6px;
      line-height: 1.3;
    }
    #chart { flex: 1; min-height: 0; width: 100%; }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <div class="chart-header">
      <h1><b>2h</b> assets deliver the highest IRR at <b>13.2%</b> in the central scenario</h1>
      <div class="chart-subheader">Project IRR by BESS duration (15-year project life, central scenario)</div>
    </div>

    <div id="chart"></div>
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    const durations = ['1h', '2h', '4h'];
    const irrValues = [9.5, 13.2, 12.8];
    const colors = ['#f7c191', '#6F5FE5', '#27ac60'];

    const data = [
      {
        name: 'IRR',
        type: 'bar',
        x: durations,
        y: irrValues,
        marker: { color: colors, line: { width: 0 } },
        text: irrValues.map(v => `${v}%`),
        textposition: 'outside',
        textfont: { size: 13, color: '#4a4a4a', family: '"DM Sans", sans-serif', weight: 500 },
        cliponaxis: false,
        hovertemplate: '%{y:.1f}%<extra>%{x}</extra>',
        showlegend: false,
      },
    ];

    // ===== LAYOUT =====
    const layout = {
      font: { family: '"DM Sans", sans-serif', color: '#4a4a4a', size: 12 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      margin: { t: 10, r: 20, b: 40, l: 0, pad: 0 },
      title: null,
      bargap: 0.45,
      xaxis: {
        showgrid: false,
        showline: false,
        tickfont: { size: 14, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        automargin: true,
      },
      yaxis: {
        showgrid: true,
        gridcolor: '#E8E8E8',
        gridwidth: 1,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        zeroline: true,
        zerolinecolor: '#D0D0D0',
        zerolinewidth: 1,
        automargin: true,
        title: { text: 'IRR (%)', font: { size: 12, color: '#4a4a4a' } },
        range: [0, 17],
        ticksuffix: '%',
      },
      legend: {
        orientation: 'h',
        yanchor: 'bottom',
        y: 1.02,
        xanchor: 'left',
        x: 0,
        font: { size: 13, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        bgcolor: 'rgba(255,255,255,0)',
        borderwidth: 0,
      },
      hovermode: 'closest',
      hoverlabel: {
        bgcolor: '#333333',
        font: { family: '"DM Sans", sans-serif', size: 13, color: '#FFFFFF' },
        bordercolor: '#333333',
      },
    };

    // ===== RENDER =====
    Plotly.newPlot('chart', data, layout, {
      responsive: true,
      displayModeBar: false,
      staticPlot: false,
    });

    window.addEventListener('resize', () => { Plotly.Plots.resize('chart'); });
  </script>
</body>
</html>
