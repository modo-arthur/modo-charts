<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB Market Operations</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #333333;
    }
    .chart-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 24px 24px 16px 24px;
    }
    .chart-header { margin-bottom: 2px; }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.3;
      color: #333333;
      margin: 0;
    }
    .chart-header h1 b { font-weight: 700; }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a4a4a;
      margin-top: 6px;
      line-height: 1.3;
    }
    #chart { flex: 1; min-height: 0; width: 100%; }
    .chart-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 10px;
      gap: 16px;
    }
    .chart-footer-left { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .chart-source {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #AAAAAA;
      line-height: 1.4;
    }
    .chart-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #333333;
      letter-spacing: 0.25em;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <div class="chart-header">
      <h1>Wholesale arbitrage grows from <b>33%</b> in 2026 to over <b>80%</b> of revenue by 2030</h1>
      <div class="chart-subheader">Revenue mix by market segment (% of total)</div>
    </div>

    <div id="chart"></div>

    <div class="chart-footer">
      <div class="chart-footer-left">
        <div class="chart-source">Source: Modo Energy</div>
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    // ===== DATA =====
    const years = ['2026','2027','2028','2029','2030','2031','2032','2033','2034','2035','2036','2037','2038','2039','2040'];

    const dcDmDr = [40, 35, 28, 22, 15, 12, 11, 10, 9, 9, 8, 8, 7, 7, 7];
    const bm     = [20, 18, 15, 12,  8,  5,  4,  4, 4, 3, 3, 3, 3, 3, 3];
    const whl    = [30, 32, 35, 40, 47, 53, 58, 61, 63, 64, 65, 66, 67, 68, 70];
    const totals = dcDmDr.map((v, i) => v + bm[i] + whl[i]);

    const pctDc  = dcDmDr.map((v, i) => Math.round(v / totals[i] * 100));
    const pctBm  = bm.map((v, i) => Math.round(v / totals[i] * 100));
    const pctWhl = whl.map((v, i) => Math.round(v / totals[i] * 100));

    const data = [
      {
        name: 'DC/DM/DR',
        type: 'bar',
        x: years,
        y: pctDc,
        marker: { color: '#467ee4', line: { width: 0 } },
        hovertemplate: '%{y}%<extra>DC/DM/DR</extra>',
      },
      {
        name: 'BM',
        type: 'bar',
        x: years,
        y: pctBm,
        marker: { color: '#27ac60', line: { width: 0 } },
        hovertemplate: '%{y}%<extra>BM</extra>',
      },
      {
        name: 'Wholesale',
        type: 'bar',
        x: years,
        y: pctWhl,
        marker: { color: '#f7c191', line: { width: 0 } },
        hovertemplate: '%{y}%<extra>Wholesale</extra>',
      },
    ];

    // ===== LAYOUT =====
    const layout = {
      font: { family: '"DM Sans", sans-serif', color: '#4a4a4a', size: 12 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      margin: { t: 10, r: 20, b: 40, l: 0, pad: 0 },
      title: null,
      barmode: 'stack',
      bargap: 0.3,
      xaxis: {
        showgrid: false,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        automargin: true,
      },
      yaxis: {
        showgrid: true,
        gridcolor: '#E8E8E8',
        gridwidth: 1,
        showline: false,
        tickfont: { size: 12, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        zeroline: true,
        zerolinecolor: '#D0D0D0',
        zerolinewidth: 1,
        automargin: true,
        title: { text: '% of total revenue', font: { size: 12, color: '#4a4a4a' } },
        range: [0, 105],
        ticksuffix: '%',
      },
      legend: {
        orientation: 'h',
        yanchor: 'bottom',
        y: 1.02,
        xanchor: 'left',
        x: 0,
        font: { size: 13, color: '#4a4a4a', family: '"DM Sans", sans-serif' },
        bgcolor: 'rgba(255,255,255,0)',
        borderwidth: 0,
        itemsizing: 'constant',
        traceorder: 'normal',
      },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#333333',
        font: { family: '"DM Sans", sans-serif', size: 13, color: '#FFFFFF' },
        bordercolor: '#333333',
      },
    };

    // ===== RENDER =====
    Plotly.newPlot('chart', data, layout, {
      responsive: true,
      displayModeBar: false,
      staticPlot: false,
    });

    window.addEventListener('resize', () => { Plotly.Plots.resize('chart'); });
  </script>
</body>
</html>
